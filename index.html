<!DOCTYPE html>
<html>
 <head style="body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f0f8ff;
            color: #333;
            line-height: 1.6;
        }
        
        h1 {
            color: #2c3e50;
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        h2 {
            color: #e74c3c;
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
        }
        
        h3 {
            color: #8e44ad;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background-color: white;
        }
        
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        
        th {
            background-color: #3498db;
            color: white;
        }
        
        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        
        tfoot {
            background-color: #e8f4fd;
            font-weight: bold;
        }
        
        img {
            max-width: 200px;
            height: auto;
            margin: 10px;
            border: 2px solid #3498db;
            border-radius: 5px;
        }
        
        p {
            background-color: white;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
        }
        
        ul, ol {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            margin: 15px 0;
        }
        
        a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        caption {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        
        div {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background-color: white;
            border-radius: 5px;
        } ">
        
   <meta charset="UTF-8">
   <title>HTML - Introdução à Computação</title>
 </head>
 <body>
   <h1>Bem-vindo ao HTML</h1>
   <p>Este é um exemplo básico de uma página HTML.</p>
 </body>
</html>
